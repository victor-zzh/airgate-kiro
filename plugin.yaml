# 本文件由 backend/cmd/genmanifest 自动生成，请勿手工修改。

id: gateway-kiro
name: Kiro 网关
version: 1.0.0
description: Kiro (AWS CodeWhisperer) 反代网关，兼容 Anthropic Messages API
author: hopbase
type: gateway
min_core_version: 1.0.0
dependencies: []
config:
  - key: kiro_version
    label: Kiro IDE 版本号
    type: string
    required: false
    default: 0.11.107
  - key: node_version
    label: Node.js 版本标识
    type: string
    required: false
    default: 22.22.0
  - key: default_region
    label: 默认 AWS Region
    type: string
    required: false
    default: us-east-1
  - key: kiro_commit
    label: Kiro IDE Commit Hash
    type: string
    required: false
frontend_widgets:
  - slot: account-create
    entry_file: index.js
    title: 创建账号表单
  - slot: account-edit
    entry_file: index.js
    title: 编辑账号表单
  - slot: account-usage-window
    entry_file: index.js
    title: 账号用量窗口
gateway:
  platform: kiro
  mode: simple
  routes:
    - method: POST
      path: /v1/messages
      description: Messages API
    - method: POST
      path: /v1/messages/count_tokens
      description: Token 计数
    - method: GET
      path: /v1/models
      description: 模型列表
  models:
    - id: claude-sonnet-4-5-20250929
      name: Claude Sonnet 4.5
      context_window: 200000
      max_output_tokens: 64000
      capabilities:
        - chat
        - reasoning
    - id: claude-sonnet-4-6
      name: Claude Sonnet 4.6
      context_window: 1000000
      max_output_tokens: 64000
      capabilities:
        - chat
        - reasoning
    - id: claude-opus-4-5-20251101
      name: Claude Opus 4.5
      context_window: 200000
      max_output_tokens: 64000
      capabilities:
        - chat
        - reasoning
    - id: claude-opus-4-6
      name: Claude Opus 4.6
      context_window: 1000000
      max_output_tokens: 128000
      capabilities:
        - chat
        - reasoning
    - id: claude-opus-4-7
      name: Claude Opus 4.7
      context_window: 1000000
      max_output_tokens: 128000
      capabilities:
        - chat
        - reasoning
    - id: claude-haiku-4-5-20251001
      name: Claude Haiku 4.5
      context_window: 200000
      max_output_tokens: 64000
      capabilities:
        - chat
        - reasoning
  account_types:
    - key: oauth
      label: OAuth
      description: 通过浏览器 OAuth 或 IdC (BuilderID) 认证
      fields:
        - key: refresh_token
          label: Refresh Token
          type: password
          required: true
          placeholder: 从 Kiro IDE 提取
        - key: access_token
          label: Access Token
          type: password
          required: false
          placeholder: 自动刷新
        - key: expires_at
          label: 过期时间
          type: text
          required: false
          placeholder: 自动填充
        - key: profile_arn
          label: Profile ARN
          type: text
          required: false
          placeholder: 自动获取
        - key: client_id
          label: Client ID (IdC)
          type: text
          required: false
          placeholder: IdC 账号自动填充
        - key: client_secret
          label: Client Secret (IdC)
          type: password
          required: false
          placeholder: IdC 账号自动填充
        - key: region
          label: AWS Region
          type: text
          required: false
          placeholder: us-east-1
        - key: machine_id
          label: Machine ID (64位hex)
          type: text
          required: false
        - key: proxy_url
          label: 代理地址
          type: text
          required: false
          placeholder: http:// 或 socks5://
    - key: api_key
      label: Kiro API Key
      description: 使用 Kiro API Key (ksk_...) 直接访问
      fields:
        - key: kiro_api_key
          label: Kiro API Key
          type: password
          required: true
          placeholder: ksk_...
        - key: region
          label: AWS Region
          type: text
          required: false
          placeholder: us-east-1
